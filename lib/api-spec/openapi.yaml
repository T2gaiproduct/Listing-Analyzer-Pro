openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Amazon Listing Auditor API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: audits
    description: Listing audit operations
  - name: competitors
    description: Competitor analysis operations
  - name: listings
    description: Listing fetch and content generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /fetch-listing:
    post:
      operationId: fetchListing
      tags: [listings]
      summary: Fetch Amazon listing data by ASIN or URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchListingBody"
      responses:
        "200":
          description: Fetched listing data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchedListing"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /audits:
    get:
      operationId: listAudits
      tags: [audits]
      summary: List all audits
      responses:
        "200":
          description: List of audits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Audit"
    post:
      operationId: createAudit
      tags: [audits]
      summary: Create and run a new listing audit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuditBody"
      responses:
        "201":
          description: Audit with results and competitors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditWithResults"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /audits/stats:
    get:
      operationId: getAuditStats
      tags: [audits]
      summary: Get audit statistics
      responses:
        "200":
          description: Audit statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditStats"

  /audits/{id}:
    get:
      operationId: getAudit
      tags: [audits]
      summary: Get a single audit with results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Audit with results and competitors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditWithResults"
        "404":
          description: Audit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteAudit
      tags: [audits]
      summary: Delete an audit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Audit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /audits/{id}/generate-content:
    post:
      operationId: generateContent
      tags: [listings]
      summary: Generate optimized listing content using AI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedContent"
        "404":
          description: Audit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /audits/{id}/generate-ebc:
    post:
      operationId: generateEbc
      tags: [listings]
      summary: Generate A+ EBC content from a custom prompt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateEbcBody"
      responses:
        "200":
          description: Generated EBC module content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EbcContent"
        "404":
          description: Audit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /audits/{id}/generate-images:
    post:
      operationId: generateImages
      tags: [listings]
      summary: Generate all product images using AI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateImagesBody"
      responses:
        "200":
          description: Generated image records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImageRecord"
        "404":
          description: Audit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /audits/{id}/images/{type}/{index}/regenerate:
    post:
      operationId: regenerateImage
      tags: [listings]
      summary: Regenerate a single product image with optional style and aspect ratio
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [main, infographic, lifestyle]
        - name: index
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerateImageBody"
      responses:
        "200":
          description: Updated image record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageRecord"
        "404":
          description: Audit or image not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /audits/{id}/images/{type}/{index}/edit:
    post:
      operationId: editImage
      tags: [listings]
      summary: Edit a generated image with a custom prompt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [main, infographic, lifestyle]
        - name: index
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditImageBody"
      responses:
        "200":
          description: Updated image record with edit applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageRecord"
        "404":
          description: Audit or image not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /audits/{id}/competitors:
    get:
      operationId: listCompetitors
      tags: [competitors]
      summary: List all competitors for an audit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of competitors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Competitor"
    post:
      operationId: addCompetitor
      tags: [competitors]
      summary: Add a competitor listing to an audit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCompetitorBody"
      responses:
        "201":
          description: Competitor added and analyzed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Competitor"
        "404":
          description: Audit not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /competitors/{id}:
    delete:
      operationId: deleteCompetitor
      tags: [competitors]
      summary: Delete a competitor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Competitor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    FetchListingBody:
      type: object
      properties:
        asin:
          type: string
          description: Amazon ASIN (e.g. B09G9FPHY6)
        url:
          type: string
          description: Amazon product URL
      description: Either asin or url must be provided

    FetchedListing:
      type: object
      properties:
        productName:
          type: string
        asin:
          type: string
        category:
          type: ["string", "null"]
        title:
          type: string
        bulletPoints:
          type: array
          items:
            type: string
        imageUrls:
          type: array
          items:
            type: string
        targetKeywords:
          type: array
          items:
            type: string
        description:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        rating:
          type: ["string", "null"]
      required:
        - productName
        - asin
        - title
        - bulletPoints
        - imageUrls
        - targetKeywords

    GeneratedContent:
      type: object
      properties:
        title:
          type: string
        bulletPoints:
          type: array
          items:
            type: string
        keywords:
          type: array
          items:
            type: string
        htmlDescription:
          type: string
      required:
        - title
        - bulletPoints
        - keywords
        - htmlDescription

    GeneratedImages:
      type: object
      properties:
        main:
          type: array
          items:
            type: string
        infographic:
          type: array
          items:
            type: string
        lifestyle:
          type: array
          items:
            type: string
      required:
        - main
        - infographic
        - lifestyle

    ImageVersion:
      type: object
      properties:
        url:
          type: string
        style:
          type: string
        aspectRatio:
          type: string
        prompt:
          type: string
        isEdit:
          type: boolean
        generatedAt:
          type: string
      required:
        - url
        - style
        - aspectRatio
        - isEdit
        - generatedAt

    ImageRecord:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [main, infographic, lifestyle]
        index:
          type: integer
        style:
          type: string
        aspectRatio:
          type: string
        currentUrl:
          type: string
        versions:
          type: array
          items:
            $ref: "#/components/schemas/ImageVersion"
      required:
        - id
        - type
        - index
        - style
        - aspectRatio
        - currentUrl
        - versions

    GenerateImagesBody:
      type: object
      properties:
        style:
          type: string
          enum: [premium, minimal, luxury, modern, infographic, lifestyle]
        aspectRatio:
          type: string
          enum: ["1:1", "3:2", "2:3"]

    RegenerateImageBody:
      type: object
      properties:
        style:
          type: string
          enum: [premium, minimal, luxury, modern, infographic, lifestyle]
        aspectRatio:
          type: string
          enum: ["1:1", "3:2", "2:3"]

    EditImageBody:
      type: object
      properties:
        prompt:
          type: string
        style:
          type: string
          enum: [premium, minimal, luxury, modern, infographic, lifestyle]
        aspectRatio:
          type: string
          enum: ["1:1", "3:2", "2:3"]
      required:
        - prompt

    ScoreDetail:
      type: object
      properties:
        score:
          type: integer
          description: Score from 0 to 100
        issues:
          type: array
          items:
            type: string
        suggestions:
          type: array
          items:
            type: string
      required:
        - score
        - issues
        - suggestions

    AuditResult:
      type: object
      properties:
        titleScore:
          $ref: "#/components/schemas/ScoreDetail"
        bulletScore:
          $ref: "#/components/schemas/ScoreDetail"
        imageScore:
          $ref: "#/components/schemas/ScoreDetail"
        keywordScore:
          $ref: "#/components/schemas/ScoreDetail"
        overallScore:
          type: integer
        summary:
          type: string
      required:
        - titleScore
        - bulletScore
        - imageScore
        - keywordScore
        - overallScore
        - summary

    Audit:
      type: object
      properties:
        id:
          type: integer
        productName:
          type: string
        asin:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        overallScore:
          type: integer
        status:
          type: string
          enum: [pending, complete, failed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - productName
        - overallScore
        - status
        - createdAt
        - updatedAt

    AuditWithResults:
      type: object
      properties:
        id:
          type: integer
        productName:
          type: string
        asin:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        title:
          type: string
        bulletPoints:
          type: array
          items:
            type: string
        imageUrls:
          type: array
          items:
            type: string
        targetKeywords:
          type: array
          items:
            type: string
        overallScore:
          type: integer
        status:
          type: string
          enum: [pending, complete, failed]
        result:
          $ref: "#/components/schemas/AuditResult"
        competitors:
          type: array
          items:
            $ref: "#/components/schemas/Competitor"
        generatedContent:
          $ref: "#/components/schemas/GeneratedContent"
        generatedImages:
          $ref: "#/components/schemas/GeneratedImages"
        imageRecords:
          type: array
          items:
            $ref: "#/components/schemas/ImageRecord"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - productName
        - title
        - bulletPoints
        - imageUrls
        - targetKeywords
        - overallScore
        - status
        - result
        - competitors
        - createdAt
        - updatedAt

    CreateAuditBody:
      type: object
      properties:
        productName:
          type: string
        asin:
          type: string
        category:
          type: string
        title:
          type: string
        bulletPoints:
          type: array
          items:
            type: string
        imageUrls:
          type: array
          items:
            type: string
        targetKeywords:
          type: array
          items:
            type: string
      required:
        - productName
        - title
        - bulletPoints
        - imageUrls
        - targetKeywords

    Competitor:
      type: object
      properties:
        id:
          type: integer
        auditId:
          type: integer
        productName:
          type: string
        asin:
          type: ["string", "null"]
        title:
          type: string
        bulletPoints:
          type: array
          items:
            type: string
        imageCount:
          type: integer
        targetKeywords:
          type: array
          items:
            type: string
        overallScore:
          type: integer
        strengths:
          type: array
          items:
            type: string
        weaknesses:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - auditId
        - productName
        - title
        - bulletPoints
        - imageCount
        - targetKeywords
        - overallScore
        - strengths
        - weaknesses
        - createdAt

    AddCompetitorBody:
      type: object
      properties:
        productName:
          type: string
        asin:
          type: string
        title:
          type: string
        bulletPoints:
          type: array
          items:
            type: string
        imageCount:
          type: integer
        targetKeywords:
          type: array
          items:
            type: string
      required:
        - productName
        - title
        - bulletPoints
        - imageCount
        - targetKeywords

    GenerateEbcBody:
      type: object
      properties:
        prompt:
          type: string
      required:
        - prompt

    EbcContent:
      type: object
      properties:
        heroHeadline:
          type: string
        heroSubheadline:
          type: string
        heroTagline:
          type: string
        feature1Icon:
          type: string
        feature1Title:
          type: string
        feature1Body:
          type: string
        feature2Icon:
          type: string
        feature2Title:
          type: string
        feature2Body:
          type: string
        feature3Icon:
          type: string
        feature3Title:
          type: string
        feature3Body:
          type: string
        storyHeadline:
          type: string
        storyBody:
          type: string
        gridTitle:
          type: string
        grid1Title:
          type: string
        grid1Desc:
          type: string
        grid2Title:
          type: string
        grid2Desc:
          type: string
        grid3Title:
          type: string
        grid3Desc:
          type: string
        grid4Title:
          type: string
        grid4Desc:
          type: string
        closingHeadline:
          type: string
        closingBody:
          type: string
        closingCta:
          type: string
      required:
        - heroHeadline
        - heroSubheadline
        - heroTagline
        - feature1Icon
        - feature1Title
        - feature1Body
        - feature2Icon
        - feature2Title
        - feature2Body
        - feature3Icon
        - feature3Title
        - feature3Body
        - storyHeadline
        - storyBody
        - gridTitle
        - grid1Title
        - grid1Desc
        - grid2Title
        - grid2Desc
        - grid3Title
        - grid3Desc
        - grid4Title
        - grid4Desc
        - closingHeadline
        - closingBody
        - closingCta

    AuditStats:
      type: object
      properties:
        totalAudits:
          type: integer
        averageScore:
          type: integer
        highScoreCount:
          type: integer
        lowScoreCount:
          type: integer
        recentAudits:
          type: array
          items:
            $ref: "#/components/schemas/Audit"
      required:
        - totalAudits
        - averageScore
        - highScoreCount
        - lowScoreCount
        - recentAudits
