kind = "web"
previewPath = "/"
title = "Amazon Listing Auditor"
version = "1.0.0"
id = "artifacts/listing-auditor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19145

[services.development]
run = "pnpm --filter @workspace/listing-auditor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/listing-auditor", "run", "build" ]
publicDir = "artifacts/listing-auditor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19145"
BASE_PATH = "/"
